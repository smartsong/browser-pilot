<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Pilot</title>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .header h1 {
            font-size: 16px;
            margin: 0 0 0 10px;
            color: #333;
        }
        .status {
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 13px;
        }
        .status-label {
            color: #666;
        }
        .status-value {
            font-weight: 600;
        }
        .status-value.online {
            color: #10b981;
        }
        .status-value.offline {
            color: #ef4444;
        }
        .btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            font-size: 13px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="width:32px;height:32px;background:#3b82f6;border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;">🤖</div>
        <h1>Browser Pilot</h1>
    </div>

    <div class="status">
        <div class="status-item">
            <span class="status-label">服务状态</span>
            <span class="status-value" id="server-status">检测中...</span>
        </div>
        <div class="status-item">
            <span class="status-label">活跃标签页</span>
            <span class="status-value" id="active-tabs">0</span>
        </div>
    </div>

    <button class="btn" id="check-btn">刷新状态</button>

    <script src="popup.js"></script>
</body>
</html>
